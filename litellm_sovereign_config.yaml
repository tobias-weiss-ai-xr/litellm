    - {"zai/glm-5-turbo": ["qwen-397b"]}
    - {"zai/glm-5.1": ["qwen-397b"]}
    - {"saia/mistral-large-3-675b": ["qwen-397b", "zai/glm-4.7"]}
    - {"saia/glm-4.7": ["qwen-397b", "zai/glm-4.7"]}
    - {"saia/qwen3.5-397b-a17b": ["qwen-397b", "zai/glm-4.7"]}
    - {"saia/qwen3.5-122b-a10b": ["qwen-397b", "saia/mistral-large-3-675b"]}
    - {"saia/qwen3.5-35b-a3b": ["qwen-35b-149", "saia/qwen3.5-122b-a10b"]}
    - {"saia/qwen3.5-27b": ["qwen-35b-149", "saia/qwen3.5-35b-a3b"]}
    - {"saia/devstral-2-123b-instruct-2512": ["qwen-397b", "saia/mistral-large-3-675b"]}
    - {"saia/qwen3-coder-30b-a3b-instruct": ["qwen-397b", "saia/devstral-2-123b-instruct-2512"]}
    - {"saiav2/claude-opus-4.6": ["qwen-397b", "saia/mistral-large-3-675b"]}
    - {"saiav2/claude-sonnet-4.6": ["qwen-397b", "saiav2/claude-opus-4.6"]}
    - {"saiav2/gpt-5.4": ["qwen-397b", "saiav2/claude-opus-4.6"]}
    - {"saiav2/gpt-5.4-mini": ["saiav2/gpt-5.4", "qwen-397b"]}
