# ─────────────────────────────────────────────────────────────────────────────
# ROUTER SETTINGS (Local-First Routing)
# ─────────────────────────────────────────────────────────────────────────────
router_settings:
  fallbacks:
    - {"qwen-397b": ["qwen-122b", "qwen-9b-local"]}
    - {"zai/glm-4.6": ["qwen-397b"]}
    - {"zai/glm-4.7": ["qwen-397b"]}
    - {"zai/glm-4.7-flashx": ["qwen-122b"]}
    - {"zai/glm-4.6V": ["qwen-397b"]}
    - {"saia/mistral-large-3-675b": ["qwen-397b", "ollama/glm-4.7-flash"]}
    - {"saia/glm-4.7": ["qwen-397b"]}
    - {"saia/qwen3-235b-a22b": ["qwen-397b"]}
    - {"qwen-122b": ["qwen-9b-local"]}
  
  num_retries: 3
  allowed_fails: 3
  cooldown_time: 30



# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES REQUIRED
# ─────────────────────────────────────────────────────────────────────────────
# Set these before starting the proxy:
#
# export LITELLM_SALT_KEY=$(openssl rand -base64 32)
# export LITELLM_MASTER_KEY=$(openssl rand -hex 16)
# export ZAI_API_KEY="your-zai-api-key"
# export SAIA_API_KEY="your-saia-api-key"
#
# If using HashiCorp Vault:
# export HCP_VAULT_TOKEN="hvs-your-vault-token"
# export HCP_VAULT_URL="http://192.168.0.x:8200"
