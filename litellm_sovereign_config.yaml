# LiteLLM Sovereign AI Configuration
# ====================================
# For: Single developer with untrusted external APIs + local LLMs
# Goal: Keep secrets and sensitive data under your control
#
# SECURITY FEATURES:
# - Secrets stored in Vault (not env vars)
# - TLS encryption for all traffic
# - Data-at-rest encryption with LITELLM_SALT_KEY
# - Guardrails block secrets/PII to external APIs
# - Local-first routing for sensitive data
# - Encrypted audit logs (metadata only)
# - Circuit breakers for external APIs
#
# USAGE:
#   export LITELLM_SALT_KEY=$(openssl rand -base64 32)
#   export LITELLM_MASTER_KEY=$(openssl rand -hex 16)
#   poetry run litellm --config litellm_sovereign_config.yaml --port 4000 --host 0.0.0.0

# ─────────────────────────────────────────────────────────────────────────────
# GENERAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
general_settings:
  database_url: null
  store_model_in_db: false
  ssl_keyfile_path: "/home/weiss/git/litellm/tls/key.pem"
  ssl_certfile_path: "/home/weiss/git/litellm/tls/cert.pem"
  enforce_user_param: true
  reject_clientside_metadata_tags: true
  max_request_size_mb: 10
  max_response_size_mb: 50



# ─────────────────────────────────────────────────────────────────────────────
# LITELLM SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
litellm_settings:
  # Encryption key for data at rest (API keys, configs, etc.)
  # MUST be set before adding models, MUST NOT change after
  encryption_key: os.environ/LITELLM_SALT_KEY
  
  # Logging configuration (metadata only, NO content)
  success_callback: ["local_file_logger"]
  failure_callback: ["local_file_logger"]
  log_request_metadata: true
  log_full_request: false
  log_full_response: false
  
  # Audit log retention
  audit_log_retention_days: 90
  
  # Security settings
  set_verbose: false  # Keep verbose off in production
  drop_params: true  # Drop unsupported params for safety
  
  # Data classification for routing
  enable_preview_features: true  # Required for sensitivity detection

