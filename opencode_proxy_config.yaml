  # ── Local models ────────────────────────────────────────────────
  # qwen3.5-397b via AI cluster (LAN, no VPN needed)
  # NOTE: --served-model-name added to systemd template but cluster needs restart.
  # Using openai//models as safe fallback (works regardless of served-model-name).
  # Once cluster is confirmed running with --served-model-name, change to openai/qwen3.5-397b-a17b
  # - model_name: qwen3.5-397b
  #   litellm_params:
  #     model: openai//models
  #     api_key: not-needed
  #     api_base: http://192.168.0.27:8000/v1
  #   model_info:
  #     max_input_tokens: 262144
  #     max_output_tokens: 65536

  # gemma-4-26b-nvfp4 via vLLM on ai1 + ai2 + Windows llama.cpp (load-balanced, failover)
  # NOTE: vLLM backends don't support tool calling — disables to prevent cooldown cascades
  - model_name: gemma-4-26b-nvfp4
    litellm_params:
      model: openai/gemma-4-26b
      api_key: not-needed
      api_base: http://192.168.0.27:8000/v1
      litellm_model_id: gemma-4-26b
      timeout: 300
      stream_timeout: 600
    model_info:
      max_input_tokens: 262000
      supports_tool_calling: false
      supports_reasoning: false
  - model_name: gemma-4-26b-nvfp4
    litellm_params:
      model: openai/gemma-4-26b
      api_key: not-needed
      api_base: http://192.168.0.176:8000/v1
      litellm_model_id: gemma-4-26b
      timeout: 300
      stream_timeout: 600
    model_info:
      max_input_tokens: 262000
      supports_tool_calling: false
      supports_reasoning: false

  - model_name: gemma-4-26b-nvfp4
    litellm_params:
      model: openai/google_gemma-4-26B-A4B-it-Q4_K_M.gguf
      api_key: not-needed
      api_base: http://host.docker.internal:8080/v1
      timeout: 300
      stream_timeout: 60
      drop_params: true
    model_info:
      supports_tool_calling: false
      supports_reasoning: false

  # gemma-4-e2b via llama.cpp on legion (smaller/faster for quick tasks)
  - model_name: gemma-4-e2b
    litellm_params:
      model: openai/google_gemma-4-E2B-it-Q8_0.gguf
      api_key: not-needed
      api_base: http://192.168.0.81:8080/v1
      timeout: 300
      stream_timeout: 120
      drop_params: true
    model_info:
      supports_tool_calling: false
      supports_reasoning: false
      max_input_tokens: 32768

  # qwen3.5-9b for explore agent (fast contextual grep via SAIA)
  - model_name: qwen3.5-9b
    litellm_params:
      model: openai/qwen3.5-9b
      api_key: os.environ/SAIA_API_KEY
      api_base: https://chat-ai.academiccloud.de/v1
      timeout: 300

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  enable_pre_call_checks: false
  fallbacks:
    # ── Local gemma-4-26b-nvfp4 → free cloud ─────────────────────
    - gemma-4-26b-nvfp4: [groq/llama-3.3-70b-versatile, glm-5-turbo]
    # ── GLM (Z.ai) → local first, then free cloud ────────────────
    - glm-5-turbo: [gemma-4-26b-nvfp4, groq/llama-3.3-70b-versatile]
    - glm-5: [glm-5-turbo, gemma-4-26b-nvfp4]
    - glm-5.1: [glm-5-turbo, gemma-4-26b-nvfp4]
    - glm-4.7: [glm-5-turbo, gemma-4-26b-nvfp4]
    # ── SAIA models → local first ────────────────────────────────
    - saia/qwen3.5-397b-a17b: [gemma-4-26b-nvfp4, glm-5-turbo]
    - saia/mistral-large-3-675b: [gemma-4-26b-nvfp4, groq/llama-3.3-70b-versatile]
    - saia/qwen3.5-122b-a10b: [gemma-4-26b-nvfp4, groq/llama-3.3-70b-versatile]
    - saia/qwen3.5-35b-a3b: [gemma-4-26b-nvfp4, groq/gemma2-9b-it]
    - saia/devstral-2-123b-instruct-2512: [gemma-4-26b-nvfp4, groq/llama-3.3-70b-versatile]
    - saia/glm-4.7: [gemma-4-26b-nvfp4, glm-5-turbo]
    - saia/gpt-oss-120b: [gemma-4-26b-nvfp4, glm-5-turbo]
    - saia/qwen3.5-9b: [gemma-4-26b-nvfp4, groq/gemma2-9b-it]
    # ── OpenRouter (free models) ────────────────────────────────
    - openrouter/llama-4-maverick: [gemma-4-26b-nvfp4, groq/llama-3.3-70b-versatile]
    - openrouter/deepseek-r1: [gemma-4-26b-nvfp4]
    - openrouter/gemini-2.0-flash: [gemma-4-26b-nvfp4]
    - openrouter/qwen-2.5-72b: [gemma-4-26b-nvfp4, groq/llama-3.3-70b-versatile]
    # ── Local large model → gemma-4-26b-nvfp4 (smaller but fast) ─
    - qwen3.5-397b: [gemma-4-26b-nvfp4, saia/qwen3.5-397b-a17b]
    # ── Groq (free tier, rate-limited) → local first ───────────────
    - groq/llama-3.3-70b-versatile: [gemma-4-26b-nvfp4, glm-5-turbo]
    - groq/gemma2-9b-it: [glm-5-turbo, groq/llama-3.3-70b-versatile]
    - groq/mixtral-8x7b-32768: [glm-5-turbo, groq/llama-3.3-70b-versatile]
    # ── Explore agent model → local fallback ──────────────────────
    - qwen3.5-9b: [gemma-4-26b-nvfp4, groq/gemma2-9b-it]
    # ── Local small model → local fallback ────────────────────────
    - gemma-4-e2b: [gemma-4-26b-nvfp4, groq/gemma2-9b-it]
  num_retries: 2
  retry_after: 5
  allowed_fails: 2
  cooldown_time: 30

litellm_settings:
  request_timeout: 600
  read_timeout: 300
  drop_params: true
  telemetry: false
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    ttl: 3600
  client_session_args:
    keep_alive_expiry: 300
    max_connections: 200
    max_keepalive_connections: 40
