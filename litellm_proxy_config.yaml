# LiteLLM Proxy Config — generated from opencode.json
# Usage: litellm --config litellm_proxy_config.yaml --port 4000 --host 0.0.0.0
#
# Required env vars:
#   export ZAI_API_KEY="your-zai-key"
#   export SAIA_API_KEY="your-saia-key"

model_list:
  # ─── ZAI (Cloud) ───────────────────────────────────────────────
  - model_name: glm-4.6
    litellm_params:
      model: openai/glm-4.6
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/coding/paas/v4

  - model_name: glm-4.6V
    litellm_params:
      model: openai/glm-4.6V
      api_key: os.environ/ZAI_API_KEY
      api_base: https://api.z.ai/api/coding/paas/v4

  - model_name: glm-4.7
