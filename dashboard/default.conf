server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API routes — exact match first, then prefix
    location = /api/all {
        proxy_pass http://docker-stats-api:8000/api/all;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
    location /stats/ {
        rewrite ^/stats/(.*) /$1 break;
        proxy_pass http://docker-stats-api:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /proxy/ {
        proxy_pass http://host.docker.internal:4000/;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # Static files (must come last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
